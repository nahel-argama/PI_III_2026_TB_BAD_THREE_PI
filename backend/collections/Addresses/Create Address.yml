info:
  name: Create Address
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/api/addresses/"
  auth: inherit
  body:
    type: json
    data: |
      {
        "street": "Main Street",
        "number": "123",
        "complement": "Apt 4",
        "neighborhood": "Downtown",
        "city": "Springfield",
        "state": "SP",
        "postal_code": "12345-678"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

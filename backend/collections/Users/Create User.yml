info:
  name: Create User
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/api/users/"
  body:
    type: json
    data: |
      {
        "email": "producer@example.com",
        "name": "John doe",
        "password": "password123",
        "user_type": "PRODUCER"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

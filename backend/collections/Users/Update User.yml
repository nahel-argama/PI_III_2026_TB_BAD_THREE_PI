info:
  name: Update User
  type: http
  seq: 3

http:
  method: PUT
  url: "{{host}}/api/users/:user_id/"
  params:
    - name: user_id
      value: "1"
      type: path
  body:
    type: json
    data: |
      {
        "email": "user@example.com",
        "name": "John doe",
        "password": "password123",
        "user_type": "PRODUCER"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

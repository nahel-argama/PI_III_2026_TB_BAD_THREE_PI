opencollection: 1.0.0

info:
  name: Production Flow for Small Producers API

config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: host
      value: http://127.0.0.1:8000
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
